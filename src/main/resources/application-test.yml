spring:
  application:
    name: pivot-collaboratif-backend

  # datasource URL/username/password sont injectes par @DynamicPropertySource (Testcontainers).

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: collaboratif

  flyway:
    enabled: true
    schemas: collaboratif
    default-schema: collaboratif
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      # host/port injectes par @DynamicPropertySource (Testcontainers) — valeurs par defaut
      # ci-dessous non utilisees en pratique.
      host: localhost
      port: 6379

server:
  port: ${SERVER_PORT:8083}
  servlet:
    context-path: /api/collaboratif

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    fr.pivot: DEBUG
    org.springframework.web: DEBUG
    org.flywaydb: INFO

pivot:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
