spring:
  application:
    name: pivot-collaboratif-backend

  datasource:
    # Instance PostgreSQL PARTAGEE avec les autres modules (voir CLAUDE.md racine pivot-platform,
    # section "Architecture BDD"). Ce module possede son propre schema Flyway ("collaboratif"),
    # jamais sa propre base.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pivot}
    username: ${SPRING_DATASOURCE_USERNAME:pivot}
    password: ${SPRING_DATASOURCE_PASSWORD:pivot}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: collaboratif

  flyway:
    enabled: true
    # create-schemas (defaut Flyway: true) cree le schema "collaboratif" avant la 1ere migration —
    # le `CREATE SCHEMA IF NOT EXISTS` de V1__schema_init.sql est donc redondant/idempotent,
    # conserve par securite (convention explicite demandee au bootstrap).
    schemas: collaboratif
    default-schema: collaboratif
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  data:
    redis:
      # Instance Redis PARTAGEE avec les autres modules — valeurs par defaut, overridees via
      # SPRING_DATA_REDIS_HOST / SPRING_DATA_REDIS_PORT (relaxed binding Spring Boot 4.x).
      host: localhost
      port: 6379

server:
  # Port dedie au module Collaboratif (table des ports de service, pivot-docs/docs/architecture/
  # platform-overview.md) : pivot-core=8080, pivot-pilotage-core=8081, pivot-agilite-core=8082,
  # pivot-collaboratif-core=8083.
  port: ${SERVER_PORT:8083}
  servlet:
    # nginx route /api/collaboratif/** vers ce service SANS reecriture de chemin (proxy_pass sans
    # path final) — le context-path doit donc reprendre exactement ce prefixe cote JVM.
    context-path: /api/collaboratif
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
      internal-proxies: ${PIVOT_TRUSTED_PROXIES:10\.\d{1,3}\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|172\.(1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}|127\.\d{1,3}\.\d{1,3}\.\d{1,3}|::1|0:0:0:0:0:0:0:1}

management:
  # EN04.2 — port de management Actuator separe du port applicatif (server.port, ci-dessus),
  # meme pattern que pivot-core (voir Dockerfile). Non route par nginx, isolation reseau
  # appliquee cote docker-compose (pas de publication host). Quand management.server.port differe
  # de server.port, Spring Boot n'applique PAS server.servlet.context-path aux endpoints Actuator
  # (contexte de servlet management distinct) : health reste joignable sur
  # http://localhost:8081/actuator/health, sans le prefixe /api/collaboratif.
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    fr.pivot: ${LOG_LEVEL_PIVOT:INFO}
    org.springframework.web: ${LOG_LEVEL_WEB:WARN}
    org.flywaydb: ${LOG_LEVEL_FLYWAY:WARN}

pivot:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  share:
    # Base URL of the Angular frontend — used to compose invitation links.
    # Override in production via PIVOT_SHARE_BASE_URL.
    base-url: ${PIVOT_SHARE_BASE_URL:http://localhost:4200}
  activemq:
    # EN07.3 — shared ActiveMQ broker (KahaDB persistence, built in pivot-core), STOMP relay
    # for the collaboratif-domain cross-module bus (/topic/collaboratif.*). Defaults match the
    # Docker Compose service name/port defined in pivot-core (dev + prod). relay-enabled is
    # overridden to false in application-test.yml — see WebSocketConfig's class JavaDoc.
    relay-enabled: ${PIVOT_ACTIVEMQ_RELAY_ENABLED:true}
    relay-host: ${PIVOT_ACTIVEMQ_RELAY_HOST:activemq}
    relay-port: ${PIVOT_ACTIVEMQ_RELAY_PORT:61613}
