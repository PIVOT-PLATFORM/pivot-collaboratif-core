name: Setup Java + Maven
description: Configure Temurin 25 with Maven dependency cache (single source of truth)

runs:
  using: composite
  steps:
    - name: Setup Java 25
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
        # EN08.3 : credentials GitHub Packages (repo "github" + repo "pivot-core-packages")
        # gérées via le settings.xml committé (.mvn/settings.xml, chargé par tout mvn/mvnw
        # via .mvn/maven.config) plutôt qu'ici — un seul fichier, valable aussi bien en CI
        # que dans le build Docker, pas de duplication de config par job.
